name: Renovate
on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: renovate
  cancel-in-progress: false
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.17
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: jeffrichley/vox
          LOG_LEVEL: info
