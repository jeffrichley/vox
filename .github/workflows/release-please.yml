# Release-please: conventional commits → release PR; merge that PR triggers run again → release + PyPI + assets.
# Trigger: manual (Run workflow) to create/update Release PR; push to main (e.g. merge Release PR) runs again and creates release.
# See https://github.com/googleapis/release-please
name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Enable auto-merge for release PR
        if: steps.release.outputs.prs_created == 'true'
        run: |
          PR_NUMBER="$(gh pr list --state open --head release-please--branches--main --json number -q '.[0].number')"
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No release-please PR found; skipping auto-merge setup."
            exit 0
          fi
          gh pr merge "$PR_NUMBER" --auto --merge
