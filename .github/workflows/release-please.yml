# Release-please: conventional commits → release PR; merge that PR triggers run again → release + PyPI + assets.
# Trigger: manual (Run workflow) to create/update Release PR; push to main (e.g. merge Release PR) runs again and creates release.
# See https://github.com/googleapis/release-please
name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
