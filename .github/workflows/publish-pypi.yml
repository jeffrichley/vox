# Publish to PyPI when a GitHub release is published (e.g. by release-please).
# Also runs after release-please succeeds: releases created by a workflow using
# GITHUB_TOKEN do not trigger release:published (GitHub prevents recursive runs),
# so we trigger on workflow_run as well.
# Uses PyPI Trusted Publishers (OIDC). Configure on PyPI for this repo and workflow filename.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_run:
    workflows: [release-please]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Only run on release event, or when release-please workflow succeeded (it just created a release)
    if: github.event_name == 'release' || github.event.workflow_run.conclusion == 'success'
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      # When triggered by workflow_run, only proceed if the latest release was just created (within 5 min)
      - name: Skip unless release is fresh (workflow_run only)
        id: fresh
        if: github.event_name == 'workflow_run'
        run: |
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          CREATED=$(gh release view "$TAG" --json publishedAt -q .publishedAt)
          NOW=$(date -u +%s)
          CREATED_TS=$(date -d "${CREATED%%Z}Z" +%s 2>/dev/null || date -d "$CREATED" +%s 2>/dev/null)
          if [ $((NOW - CREATED_TS)) -gt 300 ]; then echo "skip=1" >> $GITHUB_OUTPUT; else echo "skip=0" >> $GITHUB_OUTPUT; fi

      - name: Get release tag
        id: tag
        if: github.event_name == 'release' || steps.fresh.outputs.skip != '1'
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(gh release list --limit 1 --json tagName -q '.[0].tagName')" >> $GITHUB_OUTPUT
          fi

      - name: Verify required release assets exist
        if: github.event_name == 'release' || steps.fresh.outputs.skip != '1'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          REQUIRED=(
            "vox-${TAG}-windows-amd64.zip"
            "vox-${TAG}-macos-arm64.zip"
            "vox-${TAG}-linux-x86_64.tar.gz"
          )
          for attempt in $(seq 1 45); do
            ASSET_NAMES="$(gh release view "$TAG" --json assets -q '.assets[].name')"
            echo "Asset check attempt ${attempt}/45 for ${TAG}"
            echo "$ASSET_NAMES"
            MISSING=0
            for expected in "${REQUIRED[@]}"; do
              if ! echo "$ASSET_NAMES" | grep -Fxq "$expected"; then
                MISSING=1
                echo "Still missing: $expected"
              fi
            done
            if [ "$MISSING" -eq 0 ]; then
              echo "All required release assets are present."
              exit 0
            fi
            sleep 20
          done
          echo "Timed out waiting for required release assets."
          exit 1

      - name: Checkout
        if: github.event_name == 'release' || steps.fresh.outputs.skip != '1'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install uv
        if: github.event_name == 'release' || steps.fresh.outputs.skip != '1'
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        if: github.event_name == 'release' || steps.fresh.outputs.skip != '1'
        run: uv python install 3.12

      - name: Build
        if: github.event_name == 'release' || steps.fresh.outputs.skip != '1'
        run: uv build --no-sources

      - name: Publish to PyPI
        if: github.event_name == 'release' || steps.fresh.outputs.skip != '1'
        run: uv publish
        # Trusted publishing: with id-token: write and no UV_PUBLISH_TOKEN,
        # uv obtains a short-lived token from PyPI via OIDC. If the index
        # rejects attestations, add: env: UV_PUBLISH_NO_ATTESTATIONS: 1
