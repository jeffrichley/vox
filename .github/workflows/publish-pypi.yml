# Publish to PyPI when a GitHub release is published (e.g. by release-please).
# Also runs after release-please succeeds: releases created by a workflow using
# GITHUB_TOKEN do not trigger release:published (GitHub prevents recursive runs),
# so we trigger on workflow_run as well.
# Uses PyPI Trusted Publishers (OIDC). Configure on PyPI for this repo and workflow filename.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_run:
    workflows: [release-please]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    # Only run on release event, or when release-please workflow succeeded (it just created a release)
    if: github.event_name == 'release' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get release tag
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(gh release list --limit 1 -q .tagName)" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Build
        run: uv build --no-sources

      - name: Publish to PyPI
        run: uv publish
        # Trusted publishing: with id-token: write and no UV_PUBLISH_TOKEN,
        # uv obtains a short-lived token from PyPI via OIDC. If the index
        # rejects attestations, add: env: UV_PUBLISH_NO_ATTESTATIONS: 1
