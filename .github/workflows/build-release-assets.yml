# Build PyInstaller onedir per OS; smoke-test; upload archives to the GitHub Release.
# Also runs after release-please succeeds (releases created by GITHUB_TOKEN don't trigger release:published).
name: Build release assets

on:
  release:
    types: [published]
  workflow_run:
    workflows: [release-please]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  get-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.workflow_run.conclusion == 'success'
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      # When triggered by workflow_run, only proceed if the latest release was just created (within 5 min)
      - name: Skip unless release is fresh (workflow_run only)
        id: fresh
        if: github.event_name == 'workflow_run'
        run: |
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName')
          CREATED=$(gh release view "$TAG" --json publishedAt -q .publishedAt)
          NOW=$(date -u +%s)
          CREATED_TS=$(date -d "${CREATED%%Z}Z" +%s 2>/dev/null || date -d "$CREATED" +%s 2>/dev/null)
          if [ $((NOW - CREATED_TS)) -gt 300 ]; then echo "skip=1" >> $GITHUB_OUTPUT; else echo "skip=0" >> $GITHUB_OUTPUT; fi

      - name: Get release tag
        id: tag
        if: github.event_name == 'release' || steps.fresh.outputs.skip != '1'
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(gh release list --limit 1 --json tagName -q '.[0].tagName')" >> $GITHUB_OUTPUT
          fi
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      skip: ${{ steps.fresh.outputs.skip }}

  build:
    name: Build ${{ matrix.platform }}
    needs: get-tag
    if: needs.get-tag.outputs.skip != '1'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            suffix: windows-amd64.zip
          - platform: macos
            runner: macos-latest
            suffix: macos-arm64.zip
          - platform: linux
            runner: ubuntu-latest
            suffix: linux-x86_64.tar.gz

    env:
      RELEASE_TAG: ${{ needs.get-tag.outputs.tag }}
      ARTIFACT_NAME: vox-${{ needs.get-tag.outputs.tag }}-${{ matrix.suffix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.get-tag.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build (PyInstaller onedir)
        run: uv run pyinstaller --onedir --name vox --paths src --collect-all vox src/vox/__main__.py

      - name: Smoke test (Windows)
        if: matrix.platform == 'windows'
        run: .\dist\vox\vox.exe --help

      - name: Smoke test (macOS / Linux)
        if: matrix.platform != 'windows'
        run: ./dist/vox/vox --help

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        run: Compress-Archive -Path dist\vox -DestinationPath $env:ARTIFACT_NAME

      - name: Create archive (macOS)
        if: matrix.platform == 'macos'
        run: cd dist && zip -r "../$ARTIFACT_NAME" vox && cd ..

      - name: Create archive (Linux)
        if: matrix.platform == 'linux'
        run: tar -C dist -czvf "$ARTIFACT_NAME" vox

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: ${{ env.ARTIFACT_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
